<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>กว่า-จะ-เป็น | Gwa-Ja-Pen Series</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;400;600&family=Anuphan:wght@200;400;600&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --bg-color: #FAFAFA; 
            --surface-color: #FFFFFF;
            --text-main: #1A1A1A; 
            --text-muted: #666666; 
            --border-color: #EAEAEA; 
            --accent-gold: #D4AF37;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            font-family: 'Anuphan', 'Plus Jakarta Sans', sans-serif; 
            line-height: 1.6; 
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        [data-th], [data-en] { transition: opacity 0.25s ease-in-out; }

        /* --- NAVIGATION --- */
        nav.top-bar {
            position: fixed; top: 0; left: 0; width: 100%;
            padding: 25px 6vw; display: flex; justify-content: space-between;
            z-index: 100; color: white;
            background: linear-gradient(to bottom, rgba(0,0,0,0.6) 0%, transparent 100%);
        }
        .back-link {
            text-decoration: none; color: inherit; font-weight: 600;
            font-size: 0.9rem; letter-spacing: 1px; text-transform: uppercase;
            display: flex; align-items: center; gap: 8px; transition: opacity 0.3s;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }
        .back-link:hover { opacity: 0.7; }
        
        .lang-switcher { display: flex; gap: 10px; }
        .lang-switcher button { 
            background: transparent; border: none; font-size: 0.8rem; 
            font-weight: 600; color: inherit; cursor: pointer; opacity: 0.5;
            transition: opacity 0.3s; letter-spacing: 1px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }
        .lang-switcher button:hover { opacity: 0.8; }
        .lang-switcher button.active { opacity: 1; text-decoration: underline; text-underline-offset: 4px; }

        /* --- HERO SECTION --- */
        .hero {
            position: relative; width: 100%; height: 75vh; min-height: 500px;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            text-align: center; color: white; overflow: hidden;
            padding-top: 80px; 
        }
        .hero-banner-img {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; object-position: center 20%; z-index: -2;
            background: #1a1a1a;
        }
        .hero-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.85) 100%);
            z-index: -1;
        }
        .hero-content {
            max-width: 800px; padding: 0 20px;
            animation: fadeUp 1.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            margin-top: 5vh;
        }
        .hero-title {
            font-family: 'Lora', serif; font-size: 4.5rem; font-weight: 500;
            letter-spacing: -2px; margin-bottom: 20px; line-height: 1.1;
            text-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .hero-subtitle {
            font-size: 1.2rem; font-weight: 300; opacity: 0.9;
            max-width: 650px; margin: 0 auto; line-height: 1.8;
            text-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        /* --- LAYOUT WRAPPER --- */
        .section-container {
            max-width: 1400px; margin: 0 auto; padding: 100px 6vw;
        }
        .section-header {
            margin-bottom: 60px; text-align: center;
        }
        .section-header h2 {
            font-family: 'Lora', serif; font-size: 2.8rem; font-weight: 400; margin-bottom: 15px; color: var(--text-main);
        }
        .section-header p {
            color: var(--text-muted); font-size: 1.1rem; max-width: 600px; margin: 0 auto;
        }

        /* --- VIDEO GRID --- */
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 50px;
        }
        .video-card {
            background: var(--surface-color);
            border-radius: 20px; overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.03);
            transition: transform 0.5s ease, box-shadow 0.5s ease;
            display: flex; flex-direction: column;
        }
        .video-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 25px 50px rgba(0,0,0,0.08);
        }
        .video-embed-wrapper {
            width: 100%;
            background-color: #050505;
            display: flex;
            justify-content: center;
            align-items: center;
            /* ลบ padding ที่เคยบังคับสัดส่วนออก เพื่อให้ TikTok คำนวณความสูงเอง */
        }
        
        .video-info { padding: 30px; flex-grow: 1; display: flex; flex-direction: column; }
        .video-tag { 
            font-size: 0.75rem; text-transform: uppercase; letter-spacing: 2.5px; 
            color: var(--accent-gold); font-weight: 600; margin-bottom: 12px; display: block; 
        }
        .video-title { font-size: 1.3rem; font-weight: 600; margin-bottom: 10px; line-height: 1.4; color: var(--text-main); }
        .video-desc { font-size: 0.95rem; color: var(--text-muted); }

        /* --- WRITTEN ARCHIVES --- */
        .archive-section {
            background-color: var(--surface-color);
            padding: 100px 0; border-top: 1px solid var(--border-color);
        }
        .blog-grid {
            display: flex; flex-direction: column; gap: 0;
            border-top: 1px solid var(--border-color);
        }
        .blog-card {
            display: flex; justify-content: space-between; align-items: center;
            padding: 50px 0; border-bottom: 1px solid var(--border-color);
            text-decoration: none; color: inherit; transition: all 0.4s ease;
        }
        .blog-card:hover {
            padding-left: 30px; padding-right: 30px;
            background-color: rgba(0,0,0,0.02);
        }
        .blog-meta {
            width: 220px; font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 0.9rem; color: var(--text-muted);
        }
        .blog-meta span {
            color: var(--accent-gold); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; display: block; margin-top: 5px;
        }
        .blog-content { flex: 1; padding-right: 50px; }
        .blog-content h3 { font-family: 'Lora', serif; font-size: 2rem; font-weight: 400; margin-bottom: 12px; color: var(--text-main); }
        .blog-content p { font-size: 1.05rem; color: var(--text-muted); max-width: 800px; }
        
        .blog-arrow { font-size: 1.8rem; color: var(--accent-gold); transition: transform 0.4s; opacity: 0; transform: translateX(-20px); }
        .blog-card:hover .blog-arrow { opacity: 1; transform: translateX(0); }

        /* --- FOOTER --- */
        footer {
            text-align: center; padding: 60px 20px;
            background-color: var(--bg-color);
            border-top: 1px solid var(--border-color);
            font-size: 0.9rem; color: var(--text-muted);
        }

        @keyframes fadeUp {
            0% { opacity: 0; transform: translateY(40px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 900px) {
            .hero-title { font-size: 3rem; }
            .blog-card { flex-direction: column; align-items: flex-start; gap: 20px; padding: 40px 0; }
            .blog-card:hover { padding-left: 0; padding-right: 0; background-color: transparent; }
            .blog-meta { width: 100%; }
            .blog-content { padding-right: 0; }
            .blog-arrow { display: none; }
        }
    </style>
</head>
<body>

    <nav class="top-bar">
        <a href="https://prawees.com" class="back-link">
            <span>←</span> <span data-th="กลับสู่หน้าหลัก" data-en="Back to Prawees">กลับสู่หน้าหลัก</span>
        </a>
        <div class="lang-switcher">
            <button onclick="setLanguage('th')" id="btn-th" class="active">TH</button>
            <button onclick="setLanguage('en')" id="btn-en">EN</button>
        </div>
    </nav>

    <section class="hero">
        <img src="banner.jpg" alt="กว่า-จะ-เป็น Channel Banner" class="hero-banner-img">
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <h1 class="hero-title" data-th="กว่า-จะ-เป็น" data-en="The Journey Before">กว่า-จะ-เป็น</h1>
            <p class="hero-subtitle" data-th="เรื่องราวที่ไม่ได้ถูกเล่า ความท้าทายที่ซ่อนอยู่ และแรงบันดาลใจ" data-en="The untold stories, the unseen struggles, and unfiltered inspirations.">
                เรื่องราวที่ไม่ได้ถูกเล่า ความท้าทายที่ซ่อนอยู่ และแรงบันดาลใจภายใต้เสื้อกาวน์ของเหล่าผู้เชี่ยวชาญ
            </p>
        </div>
    </section>

    <section class="section-container">
        <div class="section-header">
            <h2 data-th="วิดีโอสัมภาษณ์" data-en="The Visual Series">วิดีโอสัมภาษณ์</h2>
            <p data-th="เจาะลึกเส้นทางชีวิตผ่านเลนส์กล้อง" data-en="Deep dives into their lives through the lens.">เจาะลึกเส้นทางชีวิตผ่านเลนส์กล้อง</p>
        </div>
        
        <div class="video-grid" id="video-container"></div>
    </section>

    <section class="archive-section">
        <div class="section-container" style="padding-top: 0; padding-bottom: 0;">
            <div class="section-header">
                <h2 data-th="จดหมายจากอาจารย์" data-en="The Written Archives">จดหมายจากอาจารย์</h2>
                <p data-th="บทสัมภาษณ์พิเศษแบบฉบับอ่าน ที่เจาะลึกข้อมูล Uncut และ Roadmap" data-en="Inspiring editorial interviews, uncut data, and roadmap insights.">บทสัมภาษณ์พิเศษแบบฉบับอ่าน ที่เจาะลึกข้อมูล Uncut และ Roadmap</p>
            </div>
            
            <div class="blog-grid" id="blog-container"></div>
        </div>
    </section>

    <footer>
        <p>© 2026 Prawees • Gwa-Ja-Pen Series</p>
    </footer>

    <script>
        const database = {
            
            // 🎬 1. ADD YOUR VIDEOS HERE
            videos: [
                {
                    episode: "01",
                    title_th: "กว่าจะเป็น “Resident นิวโรศัลย์” 🧠🔪",
                    title_en: "Neurosurgery Resident 🧠🔪",
                    desc_th: "พญ.ธนพร เจริญงามเสมอ",
                    desc_en: "Tanaporn Jaroenngarmsamer, M.D.",
                    // แก้ไขตรงนี้: ลบ Tag <script> ออกจากกล่อง embed
                    embed_code: `
                        <blockquote class="tiktok-embed" cite="https://www.tiktok.com/@gwa.ja.pen/video/7605159799625501959" data-video-id="7605159799625501959" style="max-width: 605px;min-width: 325px;" > <section> <a target="_blank" title="@gwa.ja.pen" href="https://www.tiktok.com/@gwa.ja.pen?refer=embed">@gwa.ja.pen</a> กว่าจะเป็น “Resident นิวโรศัลย์” 🧠🔪 <a title="studygramthailand" target="_blank" href="https://www.tiktok.com/tag/studygramthailand?refer=embed">#studygramthailand</a> <a title="แพทย์" target="_blank" href="https://www.tiktok.com/tag/%E0%B9%81%E0%B8%9E%E0%B8%97%E0%B8%A2%E0%B9%8C?refer=embed">#แพทย์</a> <a title="neurosurgery" target="_blank" href="https://www.tiktok.com/tag/neurosurgery?refer=embed">#neurosurgery</a> <a target="_blank" title="♬ original sound  - gwa.ja.pen" href="https://www.tiktok.com/music/original-sound-gwajapen-7605159890834836242?refer=embed">♬ original sound  - gwa.ja.pen</a> </section> </blockquote>
                    `
                }
            ],

            // 📝 2. ADD YOUR BLOG ENTRIES HERE
            blogs: []
        };

        // ==========================================
        // ⚙️ THE ENGINE (DO NOT EDIT BELOW THIS LINE) ⚙️
        // ==========================================
        
        let currentLang = 'th';

        function renderContent() {
            // Render Videos
            const videoContainer = document.getElementById('video-container');
            videoContainer.innerHTML = '';
            
            if(database.videos.length === 0) {
                videoContainer.innerHTML = `<p style="text-align:center; grid-column: 1/-1; color:var(--text-muted);">Coming soon...</p>`;
            } else {
                database.videos.forEach(video => {
                    videoContainer.innerHTML += `
                        <div class="video-card">
                            <div class="video-embed-wrapper">
                                ${video.embed_code}
                            </div>
                            <div class="video-info">
                                <span class="video-tag">EPISODE ${video.episode}</span>
                                <h3 class="video-title" data-th="${video.title_th}" data-en="${video.title_en}">${currentLang === 'th' ? video.title_th : video.title_en}</h3>
                                <p class="video-desc" data-th="${video.desc_th}" data-en="${video.desc_en}">${currentLang === 'th' ? video.desc_th : video.desc_en}</p>
                            </div>
                        </div>
                    `;
                });
            }

            // Render Blogs
            const blogContainer = document.getElementById('blog-container');
            blogContainer.innerHTML = '';
            
            if(database.blogs.length === 0) {
                blogContainer.innerHTML = `<p style="text-align:center; padding: 40px; color:var(--text-muted);">Coming soon...</p>`;
            } else {
                database.blogs.forEach(blog => {
                    blogContainer.innerHTML += `
                        <a href="${blog.link}" class="blog-card">
                            <div class="blog-meta">
                                ${blog.date}
                                <span>${blog.tag}</span>
                            </div>
                            <div class="blog-content">
                                <h3 data-th="${blog.title_th}" data-en="${blog.title_en}">${currentLang === 'th' ? blog.title_th : blog.title_en}</h3>
                                <p data-th="${blog.desc_th}" data-en="${blog.desc_en}">${currentLang === 'th' ? blog.desc_th : blog.desc_en}</p>
                            </div>
                            <div class="blog-arrow">→</div>
                        </a>
                    `;
                });
            }
        }

        function setLanguage(lang) {
            currentLang = lang;
            document.getElementById('btn-th').classList.toggle('active', lang === 'th');
            document.getElementById('btn-en').classList.toggle('active', lang === 'en');
            
            const elements = document.querySelectorAll('[data-th]');
            elements.forEach(el => {
                el.style.opacity = '0';
                setTimeout(() => {
                    el.textContent = lang === 'th' ? el.getAttribute('data-th') : el.getAttribute('data-en');
                    el.style.opacity = '1';
                }, 250);
            });
        }
        
        // Initialize
        window.onload = () => {
            renderContent(); // 1. สร้างกล่อง HTML ก่อน
            setLanguage('th'); 
            
            // 2. โหลด Script ของ TikTok เข้าไป "หลังจาก" สร้างกล่องเสร็จแล้ว
            const ttScript = document.createElement('script');
            ttScript.src = 'https://www.tiktok.com/embed.js';
            ttScript.async = true;
            document.body.appendChild(ttScript);
        };
    </script>
</body>
</html>
