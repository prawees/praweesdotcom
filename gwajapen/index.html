<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>กว่า-จะ-เป็น | Gwa-Ja-Pen Series</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⛰️</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;400;600;700&family=Anuphan:wght@200;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            /* --- EARTH TONE THEME --- */
            --bg-color: #FDF8F2; /* Creamy beige */
            --surface-color: #FFFFFF;
            --text-main: #4A3F35; /* Deep brown */
            --text-muted: #8C7A6B; 
            --border-color: rgba(140, 122, 107, 0.15); 
            --accent-primary: #A67B5B; /* Terracotta brown */
            --accent-gold: #D4AF37;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            font-family: 'Anuphan', 'Plus Jakarta Sans', sans-serif; 
            line-height: 1.5; 
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* --- NAVIGATION --- */
        nav.top-bar {
            position: fixed; top: 0; left: 0; width: 100%;
            padding: 15px 6vw; display: flex; justify-content: space-between; align-items: center;
            z-index: 100; color: white;
            background: linear-gradient(to bottom, rgba(74, 63, 53, 0.5) 0%, transparent 100%);
        }
        .back-link { display: flex; align-items: center; transition: 0.3s; }
        .site-logo { height: 26px; width: auto; filter: brightness(1.5); }
        
        .lang-switcher button { 
            background: transparent; border: none; font-size: 0.8rem; 
            font-weight: 600; color: inherit; cursor: pointer; opacity: 0.7; transition: 0.3s;
        }
        .lang-switcher button.active { opacity: 1; text-decoration: underline; text-underline-offset: 4px; }

        /* --- HERO SECTION REPOSITIONED --- */
        .hero { 
            position: relative; 
            width: 100%; 
            height: 80vh; 
            min-height: 600px; 
            display: flex; 
            justify-content: center; 
            align-items: flex-end; 
            overflow: hidden; 
            padding-bottom: 80px;
        }
        .hero-banner-img { 
            position: absolute; 
            top: 0; left: 0; 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            object-position: center 35%;
            z-index: -1; 
        }
        .hero-overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: linear-gradient(to bottom, transparent 20%, rgba(0,0,0,0.3) 50%, rgba(0,0,0,0.75) 100%); 
            z-index: 0; 
        }
        .hero-content { position: relative; z-index: 1; text-align: center; color: white; max-width: 900px; padding: 0 24px; }
        
        .hero-subtitle { font-size: 1.2rem; font-weight: 300; line-height: 1.7; text-shadow: 0 2px 10px rgba(0,0,0,0.5); margin-bottom: 35px; }

        /* HERO BUTTONS GROUP */
        .hero-btns { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; }
        
        .hero-btn {
            display: inline-flex; align-items: center; gap: 10px;
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white; text-decoration: none;
            padding: 16px 32px; border-radius: 50px;
            font-weight: 600; font-size: 0.95rem; letter-spacing: 1px;
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .hero-btn:hover {
            background: white; color: var(--text-main);
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(255,255,255,0.2);
        }
        .hero-btn.primary { background: var(--accent-primary); border-color: var(--accent-primary); }
        .hero-btn.primary:hover { background: white; color: var(--accent-primary); }

        /* --- CONTENT SECTIONS --- */
        .section-container { max-width: 1300px; margin: 0 auto; padding: 80px 6vw; }

        .aesthetic-heading { 
            font-size: 0.85rem; font-weight: 700; color: var(--accent-primary); 
            text-transform: uppercase; letter-spacing: 3px; margin-bottom: 30px; 
            display: flex; align-items: center; gap: 15px; white-space: nowrap; 
        }
        .aesthetic-heading::after { content: ''; height: 1px; background: var(--border-color); flex: 1; }
        
        .wordcloud-container { display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(3, 1fr); width: 100%; height: 130px; gap: 5px; align-items: center; justify-items: center; margin-bottom: 30px; overflow: hidden; }
        .cloud-word { font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; transition: opacity 1s, color 0.4s, transform 0.4s; opacity: 0; }
        
        /* --- CARDS & INTERACTION --- */
        .video-header-controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .carousel-btn { 
            background: white; border: 1px solid var(--border-color); width: 42px; height: 42px; border-radius: 50%; 
            display: flex; justify-content: center; align-items: center; cursor: pointer; transition: 0.3s; 
            color: var(--accent-primary); box-shadow: 0 4px 10px rgba(166, 123, 91, 0.05);
        }
        .carousel-btn:hover { border-color: var(--accent-primary); transform: scale(1.05); }

        .video-grid-container { width: 100%; overflow: hidden; margin: 0 auto; max-width: 480px; }
        .video-grid { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; scroll-behavior: smooth; gap: 20px; padding-bottom: 20px; scrollbar-width: none; }
        
        .video-card { 
            background: white; border-radius: 20px; overflow: hidden; display: flex; flex-direction: column; 
            border: 1px solid var(--border-color); min-width: 100%; scroll-snap-align: center;
            box-shadow: 0 10px 30px rgba(166, 123, 91, 0.04);
        }
        .video-info-top { padding: 25px; border-bottom: 1px solid var(--border-color); }
        .video-tag { font-size: 0.7rem; color: var(--accent-gold); font-weight: 700; letter-spacing: 1px; }
        .video-title { font-size: 1.25rem; font-weight: 700; margin: 8px 0; color: var(--text-main); }
        .video-desc { font-size: 0.95rem; color: var(--text-muted); }
        .video-embed-wrapper { width: 100%; background-color: #000; display: flex; justify-content: center; overflow: hidden; }

        .notion-container { width: 100%; height: 600px; border-radius: 20px; overflow: hidden; border: 1px solid var(--border-color); background: white; position: relative; box-shadow: 0 10px 30px rgba(166, 123, 91, 0.04); }
        .form-container { width: 100%; border-radius: 20px; overflow: hidden; border: 1px solid var(--border-color); background: white; height: 450px; box-shadow: 0 10px 30px rgba(166, 123, 91, 0.04); }
        
        .footer-contact { text-align: center; padding: 80px 20px 40px; border-top: 1px solid var(--border-color); background: white; }
        .footer-links { display: flex; justify-content: center; gap: 15px; margin-bottom: 25px; flex-wrap: wrap; }
        .footer-links a { 
            background-color: var(--text-main); color: white; text-decoration: none; font-size: 0.8rem; 
            font-weight: 700; padding: 12px 30px; border-radius: 30px; transition: 0.3s; 
        }
        .footer-links a:hover { background: var(--accent-primary); transform: translateY(-3px); }
        
        body.lang-th .hero-btn, body.lang-th .aesthetic-heading, body.lang-th .cloud-word, body.lang-th .video-tag, body.lang-th .footer-links a { letter-spacing: normal !important; }

        @media (min-width: 1024px) { .main-layout { display: grid; grid-template-columns: minmax(0, 1fr) minmax(0, 1.2fr); gap: 60px; align-items: start; } .col-left, .col-right { display: flex; flex-direction: column; gap: 50px; } }
        
        /* --- HALF DESKTOP RESPONSIVE FIX --- */
        @media (max-width: 1200px) {
            .hero { height: 70vh; min-height: 400px; }
            .hero-subtitle { font-size: 1rem; margin-bottom: 25px; }
            .hero-btn { padding: 12px 24px; font-size: 0.85rem; }
        }
        
        /* --- MOBILE RESPONSIVE FIX --- */
        @media (max-width: 1023px) { 
            .hero { 
                height: 85vh;
                padding-bottom: 30px;
            } 
            .hero-banner-img { 
                object-position: center 15%;
            }
            .hero-btns { gap: 10px; }
            .hero-btn { padding: 14px 24px; font-size: 0.85rem; width: 100%; max-width: 300px; justify-content: center; }
            .main-layout { display: flex; flex-direction: column; gap: 40px; } 
            .col-left, .col-right { display: contents; } 
            .aesthetic-heading { white-space: normal; line-height: 1.4; } 
        }
    </style>
</head>
<body class="lang-th">

    <script>
        const medicalWords = ["Neurologist", "Innovator", "Cardiologist", "Entrepreneur", "Surgeon", "Scientist", "Psychiatrist", "Consultant", "Pediatrician", "Researcher", "Radiologist", "Educator", "Oncologist", "Leader", "Dermatologist", "Visionary", "Ophthalmologist", "Advocate", "Anesthesiologist", "Developer", "Pathologist", "Creator", "Practitioner", "Data Analyst", "Policy Maker", "Orthopedist", "Gynecologist", "Urologist", "Endocrinologist", "Gastroenterologist", "Nephrologist", "Pulmonologist", "Rheumatologist", "Hematologist", "Immunologist", "Allergist", "Geriatrician", "Sports Med", "Medical Illustrator", "Health Economist", "Clinical Trial", "Bioinformatician", "Medical Writer", "Epidemiologist", "Public Health", "Telemedicine", "Genomic Counselor", "Medical Device", "Health IT", "Global Health", "Nutritionist", "Rehabilitation", "Pharmacist", "Geneticist", "Toxicologist", "Audiologist", "Occupational Therapist", "Physical Therapist", "Healthcare Admin", "Ethicist"];
        const colors = ['#A67B5B', '#4A3F35', '#8C7A6B', '#D4AF37', '#B2533E', '#7D8F69'];
        function initWordCloud() { const container = document.getElementById('wordcloud'); const shuffled = medicalWords.sort(() => 0.5 - Math.random()); for(let i=0; i<9; i++) { const span = document.createElement('span'); span.className = 'cloud-word'; span.style.fontSize = `clamp(0.6rem, 1.8vw, 1rem)`; span.style.color = colors[Math.floor(Math.random() * colors.length)]; span.innerText = shuffled[i]; container.appendChild(span); setTimeout(() => { span.style.opacity = (Math.random() * 0.4 + 0.6).toFixed(2); }, i * 150); setTimeout(() => { setInterval(() => { swapWord(span); }, 3500 + Math.random() * 4000); }, Math.random() * 2500); } }
        function swapWord(element) { element.style.opacity = 0; setTimeout(() => { element.innerText = medicalWords[Math.floor(Math.random() * medicalWords.length)]; element.style.color = colors[Math.floor(Math.random() * colors.length)]; element.style.opacity = (Math.random() * 0.4 + 0.6).toFixed(2); }, 1000); }
        const database = { videos: [ { episode: "04", title_th: "แพทย์นักวิจัยระบบสุขภาพ", title_en: "Health Systems Researcher", desc_th: "กับ ศ.เกียรติคุณ นพ.ไพบูลย์ สุริยะวงศ์ไพศาล", desc_en: "with Prof.Paibul Suriyawongpaisal, M.D.", embed_code: `<blockquote class="tiktok-embed" cite="https://www.tiktok.com/@gwa.ja.pen/video/7615096735899192594" data-video-id="7615096735899192594" style="width: 100%; max-width: 605px; min-width: 280px;" > <section> <a target="_blank" title="@gwa.ja.pen" href="https://www.tiktok.com/@gwa.ja.pen?refer=embed">@gwa.ja.pen</a> </section> </blockquote>` }, { episode: "03", title_th: "อาจารย์แพทย์นิวโรเมด", title_en: "Neurology Attending", desc_th: "กับ อ.พญ.วันนิษา วงษ์พิพัฒน์พงษ์", desc_en: "with Wannisa Wongpipathpong, M.D.", embed_code: `<blockquote class="tiktok-embed" cite="https://www.tiktok.com/@gwa.ja.pen/video/7606275644078607634" data-video-id="7606275644078607634" style="width: 100%; max-width: 605px; min-width: 280px;" > <section> <a target="_blank" title="@gwa.ja.pen" href="https://www.tiktok.com/@gwa.ja.pen?refer=embed">@gwa.ja.pen</a> </section> </blockquote>` }, { episode: "02", title_th: "Resident กุมารฯ", title_en: "Pediatrics Resident", desc_th: "กับ พญ.จุฑามาศ วัฒน์ชัยพนา", desc_en: "with Juthamard Watchaipana, M.D.", embed_code: `<blockquote class="tiktok-embed" cite="https://www.tiktok.com/@gwa.ja.pen/video/7605593446358764808" data-video-id="7605593446358764808" style="width: 100%; max-width: 605px; min-width: 280px;" > <section> <a target="_blank" title="@gwa.ja.pen" href="https://www.tiktok.com/@gwa.ja.pen?refer=embed">@gwa.ja.pen</a> </section> </blockquote>` }, { episode: "01", title_th: "Resident ประสาทศัลยศาสตร์", title_en: "Neurosurgery Resident", desc_th: "กับ พญ.ธนพร เจริญงามเสมอ", desc_en: "with Tanaporn Jaroenngarmsamer, M.D.", embed_code: `<blockquote class="tiktok-embed" cite="https://www.tiktok.com/@gwa.ja.pen/video/7605159799625501959" data-video-id="7605159799625501959" style="width: 100%; max-width: 605px; min-width: 280px;"> <section> <a target="_blank" title="@gwa.ja.pen" href="https://www.tiktok.com/@gwa.ja.pen?refer=embed">@gwa.ja.pen</a> </section> </blockquote>` } ]};
        function renderVideos() { const container = document.getElementById('video-container'); container.innerHTML = database.videos.map((v) => ` <div class="video-card"> <div class="video-info-top"> <span class="video-tag">EPISODE ${v.episode}</span> <h3 class="video-title" data-th="${v.title_th}" data-en="${v.title_en}">${v.title_th}</h3> <p class="video-desc" data-th="${v.desc_th}" data-en="${v.desc_en}">${v.desc_th}</p> </div> <div class="video-embed-wrapper">${v.embed_code}</div> </div> `).join(''); const ttScript = document.createElement('script'); ttScript.src = 'https://www.tiktok.com/embed.js'; ttScript.async = true; document.body.appendChild(ttScript); }
        function scrollSlider(direction) { const container = document.getElementById('video-container'); const cardWidth = container.querySelector('.video-card').offsetWidth + 20; container.scrollBy({ left: direction * cardWidth, behavior: 'smooth' }); }
        function setLanguage(lang) { document.body.className = `lang-${lang}`; document.getElementById('btn-th').classList.toggle('active', lang === 'th'); document.getElementById('btn-en').classList.toggle('active', lang === 'en'); document.querySelectorAll('[data-th]').forEach(el => { el.textContent = lang === 'th' ? el.getAttribute('data-th') : el.getAttribute('data-en'); }); }
        window.onload = () => { initWordCloud(); renderVideos(); setLanguage('th'); };
    </script>
