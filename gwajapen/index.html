<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>กว่า-จะ-เป็น | Gwa-Ja-Pen Series</title>
    
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='25' fill='%231D1D1F'/><text x='50' y='68' font-family='sans-serif' font-size='50' font-weight='bold' fill='%23FFFFFF' text-anchor='middle'>PS</text></svg>">
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Prompt:wght@200;400;500;600&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --bg-color: #FAFAFA; 
            --surface-color: #FFFFFF;
            --text-main: #1D1D1F; 
            --text-muted: #86868B; 
            --border-color: rgba(0, 0, 0, 0.05); 
            --accent-gold: #D4AF37;
            --font-en: 'Outfit', sans-serif;
            --font-th: 'Prompt', sans-serif;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            font-family: var(--font-th); 
            line-height: 1.5; 
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* --- NAVIGATION --- */
        nav.top-bar {
            position: fixed; top: 0; left: 0; width: 100%;
            padding: 15px 5vw; display: flex; justify-content: space-between; align-items: center;
            z-index: 100; background: rgba(250, 250, 252, 0.7);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-color);
        }

        .logo-area { display: flex; align-items: center; gap: 20px; }
        
        .logo-svg {
            width: 35px; height: 35px;
            animation: floatLogo 4s ease-in-out infinite alternate;
        }

        @keyframes floatLogo {
            0% { transform: translateY(0); }
            100% { transform: translateY(-5px); }
        }

        .back-link {
            text-decoration: none; color: var(--text-main); font-weight: 600;
            font-family: var(--font-en); font-size: 0.8rem; letter-spacing: 1px;
            display: flex; align-items: center; gap: 8px; transition: opacity 0.3s;
        }
        .back-link:hover { opacity: 0.6; }
        
        .lang-switcher button { 
            background: transparent; border: none; font-size: 0.75rem; font-family: var(--font-en);
            font-weight: 700; color: var(--text-muted); cursor: pointer; transition: 0.3s;
        }
        .lang-switcher button.active { color: var(--text-main); text-decoration: underline; text-underline-offset: 4px; }

        /* --- HERO SECTION --- */
        .hero {
            position: relative; width: 100%; height: 50vh; min-height: 350px;
            display: flex; justify-content: center; align-items: flex-end;
            overflow: hidden; padding-bottom: 40px; margin-top: 60px;
        }
        .hero-banner-img {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; z-index: -1;
        }
        .hero-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, transparent 20%, rgba(0,0,0,0.5) 100%);
            z-index: 0;
        }
        .hero-content {
            position: relative; z-index: 1; text-align: center; color: white;
            max-width: 700px; padding: 0 20px;
        }
        .hero-subtitle {
            font-size: 1.1rem; font-weight: 300; line-height: 1.6;
            text-shadow: 0 2px 10px rgba(0,0,0,0.4);
        }

        /* --- LAYOUT WRAPPER --- */
        .section-container { max-width: 1200px; margin: 0 auto; padding: 60px 5vw; }
        .section-header { margin-bottom: 40px; text-align: center; }
        .section-header h2 { font-family: 'Lora', serif; font-size: 2.5rem; font-weight: 400; margin-bottom: 15px; }

        .header-socials { display: flex; justify-content: center; gap: 15px; margin-bottom: 30px; }
        .header-socials a {
            text-decoration: none; font-size: 0.75rem; font-weight: 600; font-family: var(--font-en);
            color: var(--text-muted); text-transform: uppercase; letter-spacing: 1.5px;
            padding: 8px 20px; border: 1px solid var(--border-color); border-radius: 30px;
            transition: all 0.3s;
        }
        .header-socials a:hover { color: var(--text-main); border-color: var(--text-main); background: rgba(0,0,0,0.03); }

        /* --- COMPACT VIDEO GRID --- */
        .video-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 30px;
        }
        .video-card {
            background: var(--surface-color); border-radius: 16px; overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.03); display: flex; flex-direction: column;
            border: 1px solid var(--border-color);
        }
        .video-info-top { padding: 25px 25px 15px 25px; border-bottom: 1px solid var(--border-color); }
        .video-tag { font-family: var(--font-en); font-size: 0.7rem; color: var(--accent-gold); font-weight: 700; letter-spacing: 2px; }
        .video-title { font-size: 1.2rem; font-weight: 600; margin: 8px 0; line-height: 1.4; }
        .video-desc { font-size: 0.95rem; color: var(--text-muted); }

        .video-embed-wrapper { width: 100%; background-color: #000; display: flex; justify-content: center; }

        /* --- NOTION SECTION --- */
        .notion-section { background: #FFFFFF; padding: 80px 0; border-top: 1px solid var(--border-color); }
        .notion-container {
            width: 100%; height: 600px; border-radius: 16px; overflow: hidden;
            border: 1px solid var(--border-color); box-shadow: 0 10px 40px rgba(0,0,0,0.04);
        }

        footer { text-align: center; padding: 50px; font-size: 0.75rem; font-family: var(--font-en); color: var(--text-muted); letter-spacing: 2px; }

        @media (max-width: 768px) {
            .hero { height: 40vh; }
            .section-header h2 { font-size: 2rem; }
            .notion-container { height: 500px; }
        }
    </style>
</head>
<body>

    <nav class="top-bar">
        <div class="logo-area">
            <a href="https://prawees.com">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" class="logo-svg">
                    <rect width="100" height="100" rx="25" fill="#1D1D1F"/>
                    <text x="50" y="68" font-family="'Outfit', sans-serif" font-size="50" font-weight="700" fill="#FFFFFF" text-anchor="middle">PS</text>
                </svg>
            </a>
            <a href="https://prawees.com" class="back-link">
                <span>←</span> <span data-th="INDEX" data-en="INDEX">INDEX</span>
            </a>
        </div>
        <div class="lang-switcher">
            <button onclick="setLanguage('th')" id="btn-th" class="active">TH</button>
            <button onclick="setLanguage('en')" id="btn-en">EN</button>
        </div>
    </nav>

    <section class="hero">
        <img src="banner.jpg" alt="Banner" class="hero-banner-img">
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <p class="hero-subtitle" data-th="เรื่องราวที่ไม่ได้ถูกเล่า ความท้าทายที่ซ่อนอยู่ และแรงบันดาลใจภายใต้เสื้อกาวน์" 
               data-en="The untold stories, hidden challenges, and unfiltered inspirations behind the white coat.">
                เรื่องราวที่ไม่ได้ถูกเล่า ความท้าทายที่ซ่อนอยู่ และแรงบันดาลใจภายใต้เสื้อกาวน์
            </p>
        </div>
    </section>

    <section class="section-container">
        <div class="section-header">
            <h2 data-th="คลิปสัมภาษณ์" data-en="Visual Series">คลิปสัมภาษณ์</h2>
            <div class="header-socials">
                <a href="https://www.tiktok.com/@gwa.ja.pen" target="_blank">TikTok</a>
                <a href="https://www.instagram.com/gwa.ja.pen" target="_blank">Instagram</a>
            </div>
        </div>
        <div class="video-grid" id="video-container"></div>
    </section>

    <section class="notion-section">
        <div class="section-container" style="padding-top: 0;">
            <div class="section-header">
                <h2 data-th="คลังความรู้ & Roadmap" data-en="Resources & Roadmap">คลังความรู้ & Roadmap</h2>
                <p data-th="สำรวจเส้นทางอาชีพและอ่านบทความน่าสนใจ ผ่าน Notion Database" data-en="Explore career paths and in-depth data via our Notion Database.">สำรวจเส้นทางอาชีพและอ่านบทความน่าสนใจ ผ่าน Notion Database</p>
            </div>
            
            <div class="notion-container">
                <iframe src="https://notionwidget.com/embed/YOUR_NOTION_PAGE_ID" 
                        style="width:100%; height:100%; border:0;" 
                        allowfullscreen></iframe>
            </div>
        </div>
    </section>

    <footer><p>© 2026 PRAWEES • ALL RIGHTS RESERVED</p></footer>

    <script>
        const database = {
            videos: [
                {
                    episode: "01",
                    title_th: "Neurosurgery Resident",
                    title_en: "Neurosurgery Resident",
                    desc_th: "กับ พญ.ธนพร เจริญงามเสมอ",
                    desc_en: "with Tanaporn Jaroenngarmsamer, M.D.",
                    embed_code: `<blockquote class="tiktok-embed" cite="https://www.tiktok.com/@gwa.ja.pen/video/7605159799625501959" data-video-id="7605159799625501959" style="max-width: 605px;min-width: 325px;"> <section> <a target="_blank" title="@gwa.ja.pen" href="https://www.tiktok.com/@gwa.ja.pen?refer=embed">@gwa.ja.pen</a> กว่าจะเป็น “Resident นิวโรศัลย์” 🧠🔪 </section> </blockquote>`
                }
            ]
        };
        
        function renderContent() {
            const container = document.getElementById('video-container');
            container.innerHTML = database.videos.map(v => `
                <div class="video-card">
                    <div class="video-info-top">
                        <span class="video-tag">EPISODE ${v.episode}</span>
                        <h3 class="video-title" data-th="${v.title_th}" data-en="${v.title_en}">${v.title_th}</h3>
                        <p class="video-desc" data-th="${v.desc_th}" data-en="${v.desc_en}">${v.desc_th}</p>
                    </div>
                    <div class="video-embed-wrapper">${v.embed_code}</div>
                </div>
            `).join('');
        }

        function setLanguage(lang) {
            document.getElementById('btn-th').classList.toggle('active', lang === 'th');
            document.getElementById('btn-en').classList.toggle('active', lang === 'en');
            document.querySelectorAll('[data-th]').forEach(el => {
                el.textContent = lang === 'th' ? el.getAttribute('data-th') : el.getAttribute('data-en');
            });
        }
        
        window.onload = () => {
            renderContent();
            setLanguage('th'); 
            const ttScript = document.createElement('script');
            ttScript.src = 'https://www.tiktok.com/embed.js';
            document.body.appendChild(ttScript);
        };
    </script>
</body>
</html>
