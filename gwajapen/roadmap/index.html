<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Career Roadmap | กว่า-จะ-เป็น</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌳</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;400;600;700&family=Anuphan:wght@200;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --bg-color: #FAFAFA; 
            --surface-color: #FFFFFF;
            --text-main: #1A1A1A; 
            --text-muted: #666666; 
            --border-color: #EAEAEA; 
            --accent-blue: #0066CC;
            --accent-green: #2ECC71;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            font-family: 'Anuphan', sans-serif; 
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* --- NAVIGATION --- */
        nav.top-bar {
            padding: 20px 6vw; display: flex; justify-content: space-between; align-items: center;
            background: white; border-bottom: 1px solid var(--border-color);
            position: sticky; top: 0; z-index: 100;
        }
        .back-btn { 
            text-decoration: none; color: var(--text-main); font-weight: 600; font-size: 0.9rem;
            display: flex; align-items: center; gap: 8px; transition: 0.3s;
        }
        .back-btn:hover { opacity: 0.6; transform: translateX(-5px); }

        /* --- HEADER --- */
        .roadmap-header { padding: 60px 6vw 40px; text-align: center; max-width: 900px; margin: 0 auto; }
        .roadmap-header h1 { font-size: 2.5rem; font-weight: 700; margin-bottom: 15px; letter-spacing: -1px; }
        .roadmap-header p { color: var(--text-muted); font-size: 1.1rem; }

        /* --- LOGIC TREE CONTAINER --- */
        .tree-container { max-width: 1000px; margin: 0 auto; padding: 0 6vw 100px; }
        
        .question-card {
            background: white; border: 1px solid var(--border-color); border-radius: 24px;
            padding: 40px; text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.03);
            margin-bottom: 30px; transition: all 0.5s ease;
        }

        .question-text { font-size: 1.4rem; font-weight: 600; margin-bottom: 30px; color: var(--text-main); }
        
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        
        .opt-btn {
            background: var(--bg-color); border: 1px solid var(--border-color);
            padding: 25px; border-radius: 16px; cursor: pointer; transition: 0.3s;
            text-align: left; position: relative; overflow: hidden;
        }
        .opt-btn:hover { border-color: var(--accent-blue); background: white; transform: translateY(-3px); }
        .opt-title { display: block; font-weight: 700; font-size: 1.1rem; margin-bottom: 5px; }
        .opt-desc { display: block; font-size: 0.9rem; color: var(--text-muted); line-height: 1.4; }

        /* --- RESULT SECTION --- */
        #result-area { display: none; margin-top: 40px; animation: fadeInUp 0.8s ease forwards; }
        .result-card {
            background: linear-gradient(135deg, #0066CC 0%, #003366 100%);
            color: white; padding: 50px; border-radius: 32px; text-align: center;
        }
        .result-card h2 { font-size: 2rem; margin-bottom: 15px; }
        .reset-btn {
            margin-top: 25px; background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.4);
            color: white; padding: 12px 30px; border-radius: 30px; cursor: pointer; backdrop-filter: blur(10px);
        }
        .reset-btn:hover { background: white; color: black; }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 768px) {
            .options-grid { grid-template-columns: 1fr; }
            .roadmap-header h1 { font-size: 1.8rem; }
            .question-card { padding: 30px 20px; }
        }
    </style>
</head>
<body>

    <nav class="top-bar">
        <a href="../" class="back-btn">❮ ย้อนกลับ</a>
        <div style="font-weight: 700; letter-spacing: 1px; font-size: 0.8rem; opacity: 0.5;">DECISION TREE V1.0</div>
    </nav>

    <header class="roadmap-header">
        <h1>ค้นหาเส้นทางที่ใช่ในสายการแพทย์</h1>
        <p>เพราะ "หมอ" ไม่ได้มีแค่ตรวจคนไข้ ลองตอบคำถาม 3 ข้อนี้เพื่อดูว่าตัวตนของคุณเหมาะกับงานสไตล์ไหน</p>
    </header>

    <main class="tree-container">
        
        <div id="step-1" class="question-card">
            <p class="question-text">1. คุณสนุกกับการทำงานรูปแบบไหนมากที่สุด?</p>
            <div class="options-grid">
                <button class="opt-btn" onclick="nextStep(2, 'clinical')">
                    <span class="opt-title">สายคลินิก (Clinical)</span>
                    <span class="opt-desc">ชอบพูดคุย ซักประวัติ และวินิจฉัยโรคจากคนไข้โดยตรง</span>
                </button>
                <button class="opt-btn" onclick="nextStep(2, 'non-clinical')">
                    <span class="opt-title">สายสนับสนุน (Non-Clinical)</span>
                    <span class="opt-desc">ชอบแก้ปัญหาเชิงระบบ วิจัย หรือทำงานกับเทคโนโลยีในห้อง Lab</span>
                </button>
            </div>
        </div>

        <div id="step-2" class="question-card" style="display:none;">
            <p id="q2-text" class="question-text"></p>
            <div id="q2-options" class="options-grid"></div>
        </div>

        <div id="result-area">
            <div class="result-card">
                <p style="text-transform: uppercase; letter-spacing: 2px; font-size: 0.8rem; margin-bottom: 10px; opacity: 0.8;">Your Potential Path is</p>
                <h2 id="result-title"></h2>
                <p id="result-desc" style="max-width: 600px; margin: 0 auto; opacity: 0.9;"></p>
                <button class="reset-btn" onclick="resetTree()">ลองเลือกใหม่</button>
            </div>
        </div>

    </main>

    <script>
        let choices = {};

        function nextStep(step, value) {
            choices[`step${step-1}`] = value;
            
            // ซ่อนปัจจุบัน
            document.querySelectorAll('.question-card').forEach(card => card.style.display = 'none');

            if (step === 2) {
                const q2 = document.getElementById('step-2');
                const q2Text = document.getElementById('q2-text');
                const q2Options = document.getElementById('q2-options');
                
                q2.style.display = 'block';
                q2.style.animation = 'fadeInUp 0.5s ease';

                if (value === 'clinical') {
                    q2Text.innerText = "2. เวลาเจอวิชาที่ยาก คุณชอบแก้ปัญหายังไง?";
                    q2Options.innerHTML = `
                        <button class="opt-btn" onclick="showResult('หมอศัลยกรรม / หัตถการ', 'คุณชอบใช้ทักษะฝีมือ ความแม่นยำ และการตัดสินใจที่เฉียบขาดในสถานการณ์จริง')">
                            <span class="opt-title">ลงมือทำทันที</span>
                            <span class="opt-desc">เน้นแก้ปัญหาที่เห็นตรงหน้าด้วยความแม่นยำ</span>
                        </button>
                        <button class="opt-btn" onclick="showResult('อายุรแพทย์ / จิตแพทย์', 'คุณชอบการสืบค้น วิเคราะห์ข้อมูลที่ซับซ้อน และการสื่อสารเพื่อทำความเข้าใจมนุษย์')">
                            <span class="opt-title">หาข้อมูลและวิเคราะห์</span>
                            <span class="opt-desc">เน้นการเชื่อมโยงเหตุผลและฟังเรื่องราวอย่างใจเย็น</span>
                        </button>
                    `;
                } else {
                    q2Text.innerText = "2. คุณสนใจจุดตัดของเทคโนโลยีในด้านไหน?";
                    q2Options.innerHTML = `
                        <button class="opt-btn" onclick="showResult('นักนวัตกรรม / วิศวกรชีวการแพทย์', 'คุณเหมาะกับโลก Med-Tech การสร้างอุปกรณ์หรือ AI เพื่อช่วยหมอรักษาคนได้ทีละล้านคน')">
                            <span class="opt-title">การสร้างและประดิษฐ์</span>
                            <span class="opt-desc">อยากสร้างเครื่องมือหรือ Software ใหม่ๆ มาแก้ปัญหา</span>
                        </button>
                        <button class="opt-btn" onclick="showResult('นักวิจัย / ผู้เชี่ยวชาญด้านพันธุศาสตร์', 'คุณเหมาะกับการค้นหาความลับของชีวิตในระดับโมเลกุลหรือข้อมูลขนาดใหญ่')">
                            <span class="opt-title">การค้นพบความลับใหม่ๆ</span>
                            <span class="opt-desc">ชอบอยู่ใน Lab หรือทำงานกับ Data เพื่อหาคำตอบที่โลกยังไม่รู้</span>
                        </button>
                    `;
                }
            }
        }

        function showResult(title, desc) {
            document.getElementById('step-2').style.display = 'none';
            document.getElementById('result-area').style.display = 'block';
            document.getElementById('result-title').innerText = title;
            document.getElementById('result-desc').innerText = desc;
        }

        function resetTree() {
            choices = {};
            document.getElementById('result-area').style.display = 'none';
            document.getElementById('step-1').style.display = 'block';
        }
    </script>
</body>
</html>
